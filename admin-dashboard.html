<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PrintQ - Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="shared.css"/>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo"><div class="logo-box"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="6,9 6,2 18,2 18,9"/><path d="M6,18H4a2,2,0,0,1-2-2V11a2,2,0,0,1,2-2H20a2,2,0,0,1,2,2v5a2,2,0,0,1-2,2H18"/><rect x="6" y="14" width="12" height="8"/></svg></div><div><div class="logo-name">PrintQ</div><div class="logo-role">admin</div></div></div>
  <nav>
    <a href="admin-dashboard.html" class="nav-item active"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg> Overview</a>
    <a href="admin-dashboard.html" class="nav-item"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> Manage Shops</a>
    <a href="admin-users.html" class="nav-item"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> Users</a>
    <a href="admin-dashboard.html" class="nav-item"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> All Orders</a>
  </nav>
  <div class="sidebar-user"><div class="user-row"><div class="avatar"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6c63ff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div><div><div class="user-name">Platform Admin</div><div class="user-email">admin@printq.in</div></div></div><div class="logout-row" onclick="window.location='login.html'"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Logout</div></div>
</aside>
<main class="main fade">
  <div class="page-title">Admin Overview</div>
  <div class="page-sub">Platform management and shop approvals</div>
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-label">Total Users <div class="stat-icon" style="background:var(--accent-dim)"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#6c63ff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div></div><div class="stat-value">1,284</div></div>
    <div class="stat-card"><div class="stat-label">Active Shops <div class="stat-icon" style="background:#22d3a522"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#22d3a5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div></div><div class="stat-value" style="color:var(--success)">18</div></div>
    <div class="stat-card"><div class="stat-label">Pending Approval <div class="stat-icon" style="background:#f59e0b22"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div></div><div class="stat-value" style="color:var(--warning)" id="pending-count">2</div></div>
    <div class="stat-card"><div class="stat-label">Orders Today <div class="stat-icon" style="background:#38bdf822"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div></div><div class="stat-value" style="color:#38bdf8">96</div></div>
  </div>
  <div class="card">
    <div class="card-title">Shop Management</div>
    <table>
      <thead><tr><th>Shop</th><th>Owner</th><th>Location</th><th>Orders</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody id="shop-tbody"></tbody>
    </table>
  </div>
</main>
<script>
let shops=[
  {id:1,name:"Ravi Xerox",owner:"Ravi Kumar",addr:"MG Road",status:"approved",orders:142},
  {id:2,name:"QuickPrint Co",owner:"Meena Singh",addr:"Koramangala",status:"under review",orders:0},
  {id:3,name:"Digital Docs",owner:"Sanjay Gupta",addr:"HSR Layout",status:"under review",orders:0},
  {id:4,name:"City Prints",owner:"Priya Nair",addr:"Indiranagar",status:"approved",orders:89}
];
function render(){
  document.getElementById("shop-tbody").innerHTML=shops.map(s=>`<tr id="row-${s.id}">
    <td><div style="display:flex;align-items:center;gap:10px"><div style="background:var(--accent-dim);border-radius:8px;padding:7px;display:inline-flex"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6c63ff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="6,9 6,2 18,2 18,9"/><path d="M6,18H4a2,2,0,0,1-2-2V11a2,2,0,0,1,2-2H20a2,2,0,0,1,2,2v5a2,2,0,0,1-2,2H18"/><rect x="6" y="14" width="12" height="8"/></svg></div><span style="font-weight:600">${s.name}</span></div></td>
    <td style="color:var(--muted)">${s.owner}</td>
    <td style="color:var(--muted)">${s.addr}</td>
    <td style="font-weight:600">${s.orders}</td>
    <td id="badge-${s.id}">${s.status==="approved"?'<span class="badge badge-approved">Approved</span>':'<span class="badge badge-review">Under Review</span>'}</td>
    <td id="act-${s.id}">${s.status==="under review"?`<div style="display:flex;gap:6px"><button class="btn btn-success btn-sm" onclick="approve(${s.id})">Approve</button><button class="btn btn-danger btn-sm" onclick="reject(${s.id})">Reject</button></div>`:'<button class="btn btn-ghost btn-sm">View</button>'}</td>
  </tr>`).join("");
  document.getElementById("pending-count").textContent=shops.filter(x=>x.status==="under review").length;
}
function approve(id){const s=shops.find(x=>x.id===id);s.status="approved";document.getElementById("badge-"+id).innerHTML='<span class="badge badge-approved">Approved</span>';document.getElementById("act-"+id).innerHTML='<button class="btn btn-ghost btn-sm">View</button>';document.getElementById("pending-count").textContent=shops.filter(x=>x.status==="under review").length;}
function reject(id){const r=document.getElementById("row-"+id);r.style.opacity="0";r.style.transition="opacity .3s";setTimeout(()=>{shops=shops.filter(x=>x.id!==id);render();},300);}
render();
</script>
</body>
</html>
