<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PrintQ – Shop Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="shared.css"/>
<style>
.save-toast { position:fixed; bottom:28px; right:28px; background:var(--success); color:#fff; padding:12px 22px; border-radius:12px; font-weight:600; font-size:14px; display:none; animation:slideUp .3s ease; z-index:999; }
@keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo"><div class="logo-box"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="6,9 6,2 18,2 18,9"/><path d="M6,18H4a2,2,0,0,1-2-2V11a2,2,0,0,1,2-2H20a2,2,0,0,1,2,2v5a2,2,0,0,1-2,2H18"/><rect x="6" y="14" width="12" height="8"/></svg></div><div><div class="logo-name">PrintQ</div><div class="logo-role">shop owner</div></div></div>
  <nav>
    <a href="shop-dashboard.html" class="nav-item"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg> Dashboard</a>
    <a href="shop-dashboard.html" class="nav-item"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/></svg> Order Queue</a>
    <a href="shop-profile.html" class="nav-item active"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg> Shop Profile</a>
  </nav>
  <div class="sidebar-user"><div class="user-row"><div class="avatar"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6c63ff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div><div><div class="user-name">Ravi Prints</div><div class="user-email">shop@printq.in</div></div></div><div class="logout-row" onclick="window.location='login.html'"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Logout</div></div>
</aside>

<main class="main fade">
  <div class="page-title">Shop Profile</div>
  <div class="page-sub">Manage your shop details and pricing</div>
  <div style="max-width:520px">
    <div class="card">
      <div class="card-title">Shop Details</div>
      <label class="field-label">Shop Name</label>
      <input class="field-input" type="text" value="Ravi Xerox"/>
      <label class="field-label">Address</label>
      <input class="field-input" type="text" value="MG Road, near bus stand, Bengaluru"/>
      <label class="field-label">Contact Phone</label>
      <input class="field-input" type="text" value="+91 98765 43210"/>
      <label class="field-label">Shop Description</label>
      <input class="field-input" type="text" value="Fast, reliable prints. 10+ years experience."/>
      <div class="form-row">
        <div><label class="field-label">B&amp;W Price / Page (₹)</label><input class="field-input" type="number" value="1.5" step="0.5"/></div>
        <div><label class="field-label">Color Price / Page (₹)</label><input class="field-input" type="number" value="5" step="0.5"/></div>
      </div>
      <label class="field-label">Availability</label>
      <select class="field-select">
        <option selected>🟢 Open – Accepting Orders</option>
        <option>🟡 Busy – Limited Queue</option>
        <option>🔴 Closed</option>
      </select>
      <button class="btn btn-primary" onclick="save()">✓ Save Changes</button>
    </div>
  </div>
</main>

<div class="save-toast" id="toast">✓ Changes saved successfully!</div>
<script>
function save(){
  const t=document.getElementById('toast');
  t.style.display='block';
  setTimeout(()=>t.style.display='none',2800);
}
</script>
</body>
</html>
