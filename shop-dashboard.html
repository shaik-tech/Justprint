<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PrintQ – Shop Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="shared.css"/>
<style>
.order-row { display:flex; align-items:center; justify-content:space-between; padding:15px 0; border-bottom:1px solid var(--border); }
.order-row:last-child { border-bottom:none; }
.order-left { display:flex; align-items:center; gap:14px; }
.order-right { display:flex; align-items:center; gap:12px; flex-shrink:0; }
.file-icon { border-radius:8px; padding:10px; background:var(--accent-dim); }
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo"><div class="logo-box"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="6,9 6,2 18,2 18,9"/><path d="M6,18H4a2,2,0,0,1-2-2V11a2,2,0,0,1,2-2H20a2,2,0,0,1,2,2v5a2,2,0,0,1-2,2H18"/><rect x="6" y="14" width="12" height="8"/></svg></div><div><div class="logo-name">PrintQ</div><div class="logo-role">shop owner</div></div></div>
  <nav>
    <a href="shop-dashboard.html" class="nav-item active"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg> Dashboard</a>
    <a href="shop-dashboard.html" class="nav-item"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/></svg> Order Queue</a>
    <a href="shop-profile.html" class="nav-item"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg> Shop Profile</a>
  </nav>
  <div class="sidebar-user"><div class="user-row"><div class="avatar"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6c63ff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div><div><div class="user-name">Ravi Prints</div><div class="user-email">shop@printq.in</div></div></div><div class="logout-row" onclick="window.location='login.html'"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Logout</div></div>
</aside>

<main class="main fade">
  <div class="page-title">Shop Dashboard</div>
  <div class="page-sub">Ravi Xerox · MG Road · <span style="color:var(--success)">● Open</span></div>

  <div class="stat-grid">
    <div class="stat-card"><div class="stat-label">Today's Orders <div class="stat-icon" style="background:var(--accent-dim)"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#6c63ff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div></div><div class="stat-value">8</div></div>
    <div class="stat-card"><div class="stat-label">In Queue <div class="stat-icon" style="background:#f59e0b22"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div></div><div class="stat-value" id="queue-count" style="color:var(--warning)">3</div></div>
    <div class="stat-card"><div class="stat-label">Completed <div class="stat-icon" style="background:#22d3a522"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#22d3a5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div></div><div class="stat-value" id="done-count" style="color:var(--success)">5</div></div>
    <div class="stat-card"><div class="stat-label">Revenue Today <div class="stat-icon" style="background:#f59e0b22"><svg width="15" height="15" viewBox="0 0 24 24" fill="#f59e0b" stroke="#f59e0b" stroke-width="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div></div><div class="stat-value" style="color:var(--warning)">₹285</div></div>
  </div>

  <div class="card">
    <div class="card-title">Incoming Orders</div>
    <div id="order-list">
      <!-- Dynamically rendered by JS -->
    </div>
  </div>
</main>

<script>
const orders = [
  { id:'ORD-101', customer:'Arjun Kumar',  file:'Assignment.pdf', pages:12, status:'pending',  price:18,   time:'2 min ago',  color:'B&W' },
  { id:'ORD-102', customer:'Priya Sharma', file:'Resume.docx',    pages:3,  status:'printing', price:15,   time:'15 min ago', color:'Color' },
  { id:'ORD-103', customer:'Rahul Singh',  file:'Report.pdf',     pages:45, status:'accepted', price:67.5, time:'30 min ago', color:'B&W' },
];

const nextStatus = { pending:'accepted', accepted:'printing', printing:'ready' };
const nextLabel  = { pending:'Accept', accepted:'Start Print', printing:'Mark Ready' };

function badgeClass(s){ return { pending:'badge-pending',accepted:'badge-accepted',printing:'badge-printing',ready:'badge-ready',rejected:'badge-rejected' }[s]||'badge-pending'; }

function actions(o){
  if(o.status==='ready') return '<span style="font-size:12px;color:var(--faint)">Completed ✓</span>';
  if(o.status==='rejected') return '<span style="font-size:12px;color:var(--danger)">Rejected</span>';
  const nxt = nextStatus[o.status];
  const lbl = nextLabel[o.status];
  const rejectBtn = o.status==='pending' ? `<button class="btn btn-danger btn-sm" onclick="updateOrder('${o.id}','rejected')">✕ Reject</button>` : '';
  return `<button class="btn btn-success btn-sm" onclick="updateOrder('${o.id}','${nxt}')">${lbl}</button>${rejectBtn}`;
}

function render(){
  document.getElementById('order-list').innerHTML = orders.map(o=>`
    <div class="order-row" id="row-${o.id}">
      <div class="order-left">
        <div class="file-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#6c63ff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg></div>
        <div>
          <div style="font-weight:600;margin-bottom:2px">${o.file}</div>
          <div style="font-size:12px;color:var(--muted)">${o.customer} · ${o.pages} pages · ${o.color}</div>
          <div style="font-size:11px;color:var(--faint);margin-top:2px">⏱ ${o.time}</div>
        </div>
      </div>
      <div class="order-right">
        <span class="badge ${badgeClass(o.status)}" id="badge-${o.id}">${o.status.charAt(0).toUpperCase()+o.status.slice(1)}</span>
        <span style="font-weight:700;font-size:14px">₹${o.price}</span>
        <div style="display:flex;gap:6px" id="actions-${o.id}">${actions(o)}</div>
      </div>
    </div>
  `).join('');
}

function updateOrder(id, newStatus){
  const o = orders.find(x=>x.id===id);
  if(!o) return;
  o.status = newStatus;
  document.getElementById('badge-'+id).className = 'badge '+badgeClass(newStatus);
  document.getElementById('badge-'+id).textContent = newStatus.charAt(0).toUpperCase()+newStatus.slice(1);
  document.getElementById('actions-'+id).innerHTML = actions(o);
  // update queue count
  const inQueue = orders.filter(x=>['pending','accepted','printing'].includes(x.status)).length;
  const done = orders.filter(x=>x.status==='ready').length;
  document.getElementById('queue-count').textContent = inQueue;
  document.getElementById('done-count').textContent = 5 + done;
}

render();
</script>
</body>
</html>
